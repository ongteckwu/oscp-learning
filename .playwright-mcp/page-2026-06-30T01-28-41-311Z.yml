  - text: Lesson 06 · Privilege Escalation
  - heading "Linux Privilege Escalation" [level=1] [ref=f1e11]
  - paragraph [ref=f1e12]: "Mission: pass the OSCP+ exam · Your win today: take a low-priv shell to root by finding the one misconfiguration."
  - paragraph [ref=f1e13]:
    - text: You have a shell as
    - code [ref=f1e14]: www-data
    - text: ". That's 10 points; root is the other 10. The good news: privilege escalation is the same skill you already drilled in Lesson 03 —"
    - strong [ref=f1e15]: enumeration
    - text: — just pointed inward. You don't need a clever exploit. You need to find the
    - emphasis [ref=f1e16]: one
    - text: thing this box got wrong, and the box almost always got something wrong. You already understand processes, file permissions, and how a loader resolves a library; privesc is just learning which of those an attacker leans on.
  - generic [ref=f1e17]:
    - text: You don't have to break everything.
    - text: You just have to find one misconfiguration.
  - heading "Step 0 · Stabilise your shell first" [level=2] [ref=f1e18]
  - paragraph [ref=f1e19]:
    - text: "A foothold shell from a web exploit is usually a dumb pipe: no tab-completion, no arrow keys, no job control, and it dies the moment you fat-finger Ctrl-C. Fix that"
    - emphasis [ref=f1e20]: before
    - text: "you start hunting — half-typed commands and a dropped shell waste real exam minutes. Upgrade to a proper TTY:"
  - generic [ref=f1e21]: "$ python3 -c 'import pty; pty.spawn(\"/bin/bash\")' # real bash $ Ctrl-Z # background it $ stty raw -echo; fg # hand your terminal to the shell $ export TERM=xterm; export SHELL=/bin/bash # now clear/less/vi behave"
  - paragraph [ref=f1e22]:
    - text: Now you have history, completion, and a shell that survives a stray keypress.
    - emphasis [ref=f1e23]: Then
    - text: start enumerating.
  - heading "Step 1 · Situate yourself" [level=2] [ref=f1e24]
  - paragraph [ref=f1e25]: "Before hunting, know where you stand. Three commands answer \"who am I and what can I already do?\" — and the first one alone solves a huge share of OSCP boxes:"
  - generic [ref=f1e26]: "$ sudo -l # what may I run as root? (the cheapest win) $ id; whoami # my user, groups (docker? lxd? disk? = a path) $ uname -a # kernel + arch (note it, don't rush to exploit)"
