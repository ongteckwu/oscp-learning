  - generic [ref=e163]:
    - generic [ref=e164]: How to use this course
    - text: Read a lesson, then immediately do its practice task on a real box — each lesson now names specific picks, all collected in the
    - link "Practice Box Map" [ref=e165] [cursor=pointer]:
      - /url: reference/practice-boxes.html
    - text: (cross-checked against
    - link "TJ Null's list" [ref=e166] [cursor=pointer]:
      - /url: reference/links.html
    - text: ). The reading is fast; the
    - emphasis [ref=e167]: doing
    - text: is where the skill forms. Bring your box notes back and ask your teacher to review them.
  - generic [ref=e168]: This course has a teacher The roadmap is a guide, not a cage — if you want to jump to Active Directory, slow down on privesc, or detour into a box you're stuck on, just say so. Ask for the next lesson, a walkthrough, a deeper dive, or a notes review. The workspace remembers where you are between sessions.
