  - text: Course contents · The path to OSCP+
  - heading "Course Contents" [level=1] [ref=e40]
  - paragraph [ref=e41]: "The whole journey, from working software engineer to exam-ready — grounded in one target: passing the OSCP+. Work the lessons in order; each ends with a hands-on task on a real box. The roadmap below is the full curriculum: all seventeen lessons, end to end, from the attack chain to a timed mock exam."
  - generic [ref=e42]:
    - text: "\"When in doubt,"
    - strong [ref=e43]: enumerate harder
    - text: ."
  - generic [ref=e44]:
    - generic [ref=e45]: How this maps to the exam
    - text: The exam is
    - strong [ref=e46]: 100 points, 70 to pass
    - text: (
    - link "full rules" [ref=e47] [cursor=pointer]:
      - /url: reference/exam-format.html
    - text: ). Three standalone machines (
    - strong [ref=e48]: 60 pts
    - text: ) test
    - emphasis [ref=e49]: enumeration → foothold → privesc
    - text: — Modules 2–3 below. The Active Directory set (
    - strong [ref=e50]: 40 pts
    - text: ) is Module 4. Pivoting (Module 5) appears across the network. And the
    - strong [ref=e51]: graded report
    - text: is Module 6. Every module earns specific points — that's why we do them in this order.
  - paragraph [ref=e52]:
    - strong [ref=e53]: "Progress: all 17 lessons complete"
    - text: — the full path from the attack chain through standalones, Active Directory, pivoting, and exam strategy to a timed mock exam. From here, the work is reps on real boxes.
